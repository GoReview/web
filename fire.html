<!-- WELCOME TO FIREWORKS TUTORIAL -->
<!DOCTYPE HTML>
<html>
	<head>
		<title>Fire</title>
		<meta http-equiv="Content-Type" content="text/html" charset="UTF-8"/>
		<meta name="description" content="Tutorial how to make fireworks in canvas" />
		<meta name="keywords" content="tutorial, fireworks, canvas, project, Javascript" />
		<meta name="author" content="FilFar" />
	</head>

	<style>
		body { margin:0; background:#000; overflow:hidden; }
		canvas { position:fixed; inset:0; display:block; z-index:100; width:100vw; height:100vh; }
		a { color:white; text-decoration:none; }
		#copyright { color:white; font-family:arial; font-size:12px; position:absolute; right:0; bottom:0; z-index:1000; }
	</style>

	<body id="body">
		<canvas id="canvas">Canvas is not supported in your browser or you don't have enabled Javascripts.</canvas>

		<script>
			window.oncontextmenu = function () { return false; }

			setTimeout(() => {
				window.location.replace("index.html");
			}, 10000);

			var canvas = document.getElementById('canvas');
			var ctx = canvas.getContext('2d');
			var frameRate = 60.0;
			var frameDelay = 1000.0 / frameRate;

			var clientWidth = innerWidth;
			var clientHeight = innerHeight;
			var timer = 0;
			var x = 0;
			var y = 0;

			function resizeCanvas() {
				clientWidth = innerWidth;
				clientHeight = innerHeight;
				canvas.width = clientWidth;
				canvas.height = clientHeight;
			}

			window.addEventListener('resize', resizeCanvas);
			resizeCanvas();

			var TimedFirework = 320;
			var LimiterTicker = 0;
			var fireworks = [];
			var particles = [];
			var typecount = 1;
			var sparks = [];
			var num = 1;
			var colorchanger = 0;

			function getAngle(posx1, posy1, posx2, posy2) {
				return Math.atan2(posy2 - posy1, posx2 - posx1) * (180 / Math.PI) + 180;
			}

			function random(min, max, round) {
				if (round == 'round') {
					return Math.round(Math.random() * (max - min) + min);
				}
				return Math.random() * (max - min) + min;
			}

			function colors() {
				if (timer > colorchanger) { num = random(1, 6, 'round'); colorchanger = timer + 28; }
				switch(num) {
					case 1: return '#ff6b6b';
					case 2: return '#ffd93b';
					case 3: return '#4dff88';
					case 4: return '#4dd9ff';
					case 5: return '#b76bff';
					case 6: return '#ff9f43';
					default: return '#ffffff';
				}
			}

			function createFirework(tx, ty) {
				var firework = new Firework();
				firework.x = firework.sx = random(clientWidth * 0.2, clientWidth * 0.8);
				firework.y = firework.sy = clientHeight + 20;
				firework.color = colors();

				if (typeof tx === 'number' && typeof ty === 'number') {
					firework.tx = tx;
					firework.ty = ty;
				} else {
					firework.tx = random(60, clientWidth - 60);
					firework.ty = random(50, clientHeight * 0.5);
				}

				var angle = getAngle(firework.sx, firework.sy, firework.tx, firework.ty);
				firework.vx = Math.cos(angle * Math.PI / 180.0);
				firework.vy = Math.sin(angle * Math.PI / 180.0);

				fireworks.push(firework);
			}

			function Firework() {
				this.x = 0;
				this.y = 0;
				this.sx = 0;
				this.sy = 0;
				this.tx = 0;
				this.ty = 0;
				this.vx = 0;
				this.vy = 0;
				this.color = '#fff';
				this.speed = random(700, 1100);
				this.gravity = 1.0;
				this.ms = 0;
				this.s = 0;
				this.del = false;

				this.update = function(ms) {
					this.ms = ms / 1000;

					if (this.s > 1500 / ms) {
						createParticles(typecount, random(20, 32, 'round'), this.x, this.y, this.color);
						this.del = true;
					} else {
						this.speed *= 0.988;
						this.x -= this.vx * this.speed * this.ms;
						this.y -= this.vy * this.speed * this.ms - this.gravity;
					}

					this.s++;
				}

				this.draw = function() {
					ctx.beginPath();
					ctx.fillStyle = this.color;
					ctx.shadowBlur = 8;
					ctx.shadowColor = this.color;
					ctx.arc(this.x, this.y, 1.6, 0, 2 * Math.PI);
					ctx.fill();
					ctx.shadowBlur = 0;
				}
			}

			function createParticles(type, count, pox, poy, color) {
				for (var i = 0; i < count; i++) {
					var par = new Particles();
					par.type = type;
					par.color = color;
					par.x = pox;
					par.y = poy;

					var angle = random(0, 360);
					var speedBoost = random(0.5, 1.2);
					par.vx = Math.cos(angle * Math.PI / 180.0) * speedBoost;
					par.vy = Math.sin(angle * Math.PI / 180.0) * speedBoost;

					particles.push(par);
				}
			}

			function Particles() {
				this.x = 0;
				this.y = 0;
				this.vx = 0;
				this.vy = 0;
				this.speed = random(180, 420);
				this.gravity = 0.8;
				this.wind = 0;
				this.type = 1;
				this.opacity = 1;
				this.s = 0;
				this.scale = 1;
				this.color = '#FFF';

				this.update = function(ms) {
					this.ms = ms / 1000;

					if (this.s > 650 / ms) this.opacity = Math.max(0, this.opacity - 0.03);

					this.speed *= 0.97;
					this.x -= this.vx * this.speed * this.ms + this.wind;
					this.y -= this.vy * this.speed * this.ms - this.gravity;

					this.s++;
				}

				this.draw = function() {
					ctx.save();
					ctx.globalAlpha = this.opacity;
					ctx.fillStyle = this.color;
					ctx.strokeStyle = this.color;
					ctx.shadowBlur = 6;
					ctx.shadowColor = this.color;

					ctx.beginPath();
					ctx.arc(this.x, this.y, 1.5, 0, 2 * Math.PI);
					ctx.fill();

					ctx.closePath();
					ctx.restore();
					ctx.shadowBlur = 0;
				}
			}

			function burstBackground() {
				ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
				ctx.fillRect(0, 0, clientWidth, clientHeight);
			}

			canvas.addEventListener('mousedown', function(evt) {
				evt = evt || window.event;
				var button = evt.which || evt.button;
				if (button == 1) {
					x = evt.clientX; y = evt.clientY; createFirework(x, y);
				} else {
					typecount = (typecount == 4) ? 1 : typecount + 1;
				}
			});

			function update(frame) {
				burstBackground();

				ctx.globalAlpha = 1;

				if (timer > LimiterTicker) {
					createFirework();
					LimiterTicker = timer + (TimedFirework / frame);
				}

				for (var i = fireworks.length - 1; i >= 0; i--) {
					if (fireworks[i].del) fireworks.splice(i, 1);
					else {
						fireworks[i].update(frame);
						fireworks[i].draw();
					}
				}

				for (var i = particles.length - 1; i >= 0; i--) {
					if (particles[i].opacity <= 0) particles.splice(i, 1);
					else {
						particles[i].update(frame);
						particles[i].draw();
					}
				}

				timer++;
			}

			var main = setInterval(function() { update(frameDelay); }, frameDelay);
		</script>
	</body>
</html>
